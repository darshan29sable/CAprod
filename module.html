<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Guide | Captain Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .module-viewer {
            padding: 8rem 5% 4rem;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .pdf-container {
            width: 100%;
            height: 800px;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            margin-top: 2rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="module-page">
    <div id="canvas-container"></div>
    <header>
        <nav>
            <div class="logo"><a href="index.html">CAPTAIN<span>AUTOMATION</span></a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About Me</a>
                <a href="resources.html" class="active">Resources</a>
                <a href="youtube.html">YouTube</a>
                <a href="mock-test.html">Mock Test</a>
                <a href="fam.html" class="btn-small">CA Community</a>
                <button id="theme-toggle" class="theme-btn" title="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
                <div class="auth-container" id="auth-container"></div>
            </div>
        </nav>
    </header>

    <main class="module-viewer">
        <a href="resources.html" class="back-nav"><i data-lucide="arrow-left"></i> Back to Resources</a>
        <h1 id="module-title">Loading Module...</h1>
        <p id="module-desc"></p>

        <div class="pdf-container">
            <iframe id="pdf-frame" src="" allow="autoplay"></iframe>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="config.js"></script>
    <script src="content.js"></script>
    <script src="main.js"></script>
    <script>
        // Module specific logic
        async function login(username, password) {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem("vault_user", username);
                    sessionStorage.setItem("vault_pass", password);
                    window.location.href = "resources.html";
                } else {
                    alert("Invalid username or password");
                }
            } catch (err) {
                alert("Backend server offline.");
            }
        }
        async function initModule() {
            const urlParams = new URLSearchParams(window.location.search);
            const moduleId = urlParams.get('id');
            const module = ALL_RESOURCES.find(r => r.id == moduleId);

            if (module) {
                // SECURITY CHECK: If exclusive, verify vault is unlocked AND user exists in remote DB
                // SECURITY CHECK: If exclusive, verify vault is unlocked
                if (module.exclusive) {
                    const savedUser = sessionStorage.getItem('vault_user');
                    const savedPass = sessionStorage.getItem('vault_pass');

                    if (!savedUser || !savedPass) {
                        alert("This resource is exclusive to Community Members. Please login.");
                        window.location.href = 'login.html';
                        return;
                    }

                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: savedUser, password: savedPass })
                        });
                        const data = await response.json();
                        
                        if (!data.success) {
                            sessionStorage.removeItem('vault_user');
                            sessionStorage.removeItem('vault_pass');
                            sessionStorage.removeItem('vault_unlocked');
                            alert("Invalid or expired session. Please login again.");
                            window.location.href = 'login.html';
                            return;
                        }
                    } catch (e) {
                         console.log("Offline bypass mode on - server not running.");
                    }
                }

                document.title = `${module.title} | Captain Automation`;
                document.getElementById('module-title').textContent = module.title;
                document.getElementById('module-desc').textContent = module.desc;
                document.getElementById('pdf-frame').src = module.link.replace('/view', '/preview');
            } else {
                window.location.href = 'resources.html';
            }
            lucide.createIcons();
        }

        initModule();


    </script>
</body>

</html>
